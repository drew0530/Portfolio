<!-- index.html -->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Portfolio</title>    
    
    <link href="https://fonts.googleapis.com/css?family=Fjalla+One|Montserrat" rel="stylesheet"/>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <link rel="stylesheet" type="text/css" href="node_modules/fullpage/dist/jquery.fullpage.css" />
    <link href="node_modules/@mdi/font/css/materialdesignicons.min.css" media="all" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="navbar__item navbar__item--hover">
        <i class="mdi mdi-github-circle mdi-36px">
        </i>
        <p class="navbar__tooltip navbar__tooltip--vertical">Github</p>
      </a>
      <a class="navbar__item navbar__item--hover">
        <i class="mdi mdi-linkedin-box mdi-36px">
        </i>
        <p class="navbar__tooltip navbar__tooltip--vertical">LinkedIn</p>
        </a>
      <a id="btnMenuOpen" class="navbar__item navbar__item--hover" onclick="menuOpen()">
        <i class="mdi mdi-menu mdi-36px">
        </i>
        <p class="navbar__tooltip navbar__tooltip--vertical">Menu</p>
        
      </a>
    </nav>
    <nav class="sidebar sidebar--closed" style="display:none">
      <ul class="sidebar__list">
        <li class="sidebar__item">
          <a class="sidebar__link sidebar__link--hover" onclick="nav('home')">
              <i class="mdi mdi-home mdi-36px"></i>
          </a>
          <a id="btnMenuClose" class="sidebar__link sidebar__link--hover" onclick="menuClose()">
            <i class="mdi mdi-chevron-right mdi-36px"></i>
          </a>
        </li>
        <svg height="5" width="100%">
          <line x1="0" x2="100%" style="stroke:#fff; stroke-width:3; stroke-linecap: round;"></line>
        </svg>
        <li class="sidebar__item">
          <a class="sidebar__link sidebar__link--hover" onclick="nav('about')">About Me</a>
        </li>
        <li class="sidebar__item">
          <a class="sidebar__link sidebar__link--hover" onclick="nav('experience')">Experience</a>
        </li>
        <li class="sidebar__item">
          <a class="sidebar__link sidebar__link--hover" onclick="nav('projects')">Projects</a>
        </li>
        <li class="sidebar__item">
          <a class="sidebar__link sidebar__link--hover" onclick="nav('contact')">Contact</a>
        </li>
      </ul>
    </nav>
    <div id="fullpage">
      <div id="s1" class="section">
        <div class="content content--left">
          <h1 class="content__title content__title--name">
            <span>Andrew</span><br>
            <span>Williamson</span>
          </h1>
          <svg class="content__lines" height="50" width="210" style="margin-top:25px">
            <line x1="5" y1="5" x2="145" y2="5" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
            <line x1="65" y1="25" x2="205" y2="25" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
          </svg>
        </div>
        <p class="content__info">↓ Scroll Down ↓</p>
      </div>
      <div id="s2" class="section">
        <div class="content content--left">
          <h1 class="content__title">About Me</h1>
          <svg class="content__lines" height="50" width="210" style="margin-top:25px">
            <line x1="5" y1="5" x2="145" y2="5" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
            <line x1="65" y1="25" x2="205" y2="25" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
          </svg>
          <div class="text">
            <p>Passionate about design,<br/>development, and illustration.</p>
          </div>
        </div>
      </div>
      <div id="s3" class="section">
        <div class="content content--left">
          <h1 class="content__title">Experience</h1>
          <svg class="content__lines" height="50" width="210" style="margin-top:25px">
            <line x1="5" y1="5" x2="145" y2="5" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
            <line x1="65" y1="25" x2="205" y2="25" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
          </svg>
        </div>
        <div class="content content--right">
          <div class="content__card"></div>
        </div>
      </div>
      <div id="s4" class="section">
        <div class="content content--left">
          <h1 class="content__title">Projects</h1>
          <svg class="content__lines" height="50" width="210" style="margin-top:25px">
            <line x1="5" y1="5" x2="145" y2="5" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
            <line x1="65" y1="25" x2="205" y2="25" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
          </svg>
          <div class="content__link">
            <a href="https://github.com/drew0530?tab=repositories"><i id="github-icon" class="mdi mdi-github-circle"></i> Github</a>
          </div>
        </div>
      </div>
      <div id="s5" class="section">
        <div class="content content--left">
          <h1 class="content__title">Contact Me</h1>
          <svg class="content__lines" height="50" width="200" style="margin-top:25px">
            <line x1="0" y1="5" x2="150" y2="5" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
            <line x1="50" y1="25" x2="200" y2="25" style="stroke:rgb(255, 89, 117); stroke-width:5; stroke-linecap: round" />
          </svg><br/>
          <span class="content__link">
            <a href="https://www.linkedin.com/in/andrew-l-drew-williamson-85727915a/"><a id="linkedin-icon" class="mdi mdi-linkedin-box"></i> LinkedIn</a>
          </span>
        </div>
      </div>
    </div>
    <script src="node_modules/parallax-js/dist/parallax.min.js"></script>
    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script type="text/javascript" src="node_modules/fullpage.js/dist/jquery.fullpage.js"></script>
    <script src="node_modules/animejs/anime.min.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
  </body>
</html>
